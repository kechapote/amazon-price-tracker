name: Update prices

on:
  schedule:
    # 毎時0分に価格スイープ（UTC基準・数分〜数十分ずれることがある）
    - cron: "0 * * * *"
    # 毎日18:20 UTC (JST 3:20) に新商品発見も実行
    - cron: "20 18 * * *"
  workflow_dispatch:
    inputs:
      discover:
        description: "新商品の自動登録も行う"
        type: boolean
        default: false

concurrency:
  group: update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Run tracker
        env:
          AFFILIATE_TAG: ${{ secrets.AFFILIATE_TAG }}
          COUNTER_URL: ${{ vars.COUNTER_URL }}
        run: |
          if [ "${{ github.event.schedule }}" = "20 18 * * *" ] || [ "${{ github.event.inputs.discover }}" = "true" ]; then
            python update.py --discover
          else
            python update.py
          fi

      - name: Commit data
        run: |
          git config user.name "price-tracker"
          git config user.email "actions@users.noreply.github.com"
          git add products.json site/data
          if ! git diff --cached --quiet; then
            git commit -m "update price data"
            git pull --rebase origin ${{ github.ref_name }}
            git push
          fi
